<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chatbot</title>
    <style>
        /* CSS Styles */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 400px; max-width: 90%; background: white; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        #chat-box { height: 450px; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #ffffff; }
        .user-msg, .bot-msg { padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .user-msg { background: #0084ff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-msg { background: #e4e6eb; color: #050505; align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #eee; background: #fff; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 14px; }
        button { padding: 0 20px; background: #0084ff; color: white; border: none; border-radius: 20px; margin-left: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0073e6; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div id="chat-box">
            <div class="bot-msg">Hello! I'm your personal chatbot. Ask me anything!</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // 1. PASTE YOUR API KEY HERE
        const API_KEY = "AIzaSyBdwy6Zwzc62UoB2uo8W3Vk4kDrrYeoTsk"; 
        
        // 2. THE FIXED FUNCTION
        async function sendMessage() {
            const input = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const userText = input.value.trim();

            if (!userText) return;

            // Add User Message to UI
            chatBox.innerHTML += `<div class="user-msg">${userText}</div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // Create placeholder for Bot response
            const botMsgDiv = document.createElement("div");
            botMsgDiv.className = "bot-msg";
            botMsgDiv.innerText = "Typing...";
            chatBox.appendChild(botMsgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // FIXED URL: Notice the 'v1beta' and the ':generateContent'
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userText }] }]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error ? data.error.message : "API Error");
                }

                // Extract response text
                const aiResponse = data.candidates[0].content.parts[0].text;
                botMsgDiv.innerText = aiResponse;

            } catch (error) {
                botMsgDiv.style.color = "red";
                botMsgDiv.innerText = "Error: " + error.message;
                console.error("Full Error:", error);
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Allow Enter Key
        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
